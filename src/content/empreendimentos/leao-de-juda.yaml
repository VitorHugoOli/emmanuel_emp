chamada: Apartamentos de 3 quartos com suíte na Glória, BH — arquitetura de vanguarda
descricao: |
  Prédio com arquitetura de vanguarda, 100% revestido e com apenas 2 apartamentos
  por andar — mais privacidade e exclusividade para você e sua família.
  Apartamentos tipo de 63 m² (acima da média do mercado), com 3 quartos sendo 1 suíte,
  cozinha americana espaçosa, porcelanato de primeira linha e bancadas em granito.
  Coberturas com 3 quartos, 3 banheiros, 2 vagas e ambiente ao ar livre.

previsao_entrega: Conclusão em maio/2026 · Entrega das chaves em julho/2026

